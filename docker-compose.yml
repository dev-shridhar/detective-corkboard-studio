version: "3.9"

services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: corkboard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: corkboard
      POSTGRES_PASSWORD: corkboard_secret
      POSTGRES_DB: corkboard_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corkboard -d corkboard_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: corkboard_api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://corkboard:corkboard_secret@db:5432/corkboard_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app  # Hot reload in development

  # Frontend — serve static files locally
  frontend:
    image: nginx:alpine
    container_name: corkboard_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  postgres_data:
