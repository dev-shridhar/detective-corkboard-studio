<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Outer circle background -->
  <circle cx="256" cy="256" r="240" fill="#1a1a2e"/>
  <!-- Gold outer border -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#C5A55A" stroke-width="8"/>
  <!-- Inner dark-blue badge circle -->
  <circle cx="256" cy="256" r="180" fill="#16213e" stroke="#C5A55A" stroke-width="4"/>
  <!-- Crosshairs/gridlines matching detective chalkboard/corkboard layout -->
  <line x1="256" y1="76" x2="256" y2="436" stroke="#C5A55A" stroke-width="1.5" opacity="0.3"/>
  <line x1="76" y1="256" x2="436" y2="256" stroke="#C5A55A" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="30" fill="none" stroke="#C5A55A" stroke-width="2" opacity="0.3"/>
  <!-- Red pushpin at the top -->
  <circle cx="256" cy="60" r="18" fill="#E53935" stroke="#8B0000" stroke-width="3"/>
  <circle cx="251" cy="55" r="5" fill="white" opacity="0.4"/>
  <line x1="256" y1="78" x2="256" y2="100" stroke="#555" stroke-width="4"/>
  <!-- DC Badge Text -->
  <text x="256" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="150" font-weight="bold" fill="#C5A55A" text-anchor="middle" dominant-baseline="central" letter-spacing="10">DC</text>
  <!-- Detective Corkboard Text at the bottom -->
  <text x="256" y="375" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="bold" fill="#C5A55A" text-anchor="middle" opacity="0.8" letter-spacing="4">DETECTIVE</text>
  <text x="256" y="410" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="bold" fill="#C5A55A" text-anchor="middle" opacity="0.8" letter-spacing="4">CORKBOARD</text>
</svg>
