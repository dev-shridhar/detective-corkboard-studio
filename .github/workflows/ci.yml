name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint & Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: corkboard
          POSTGRES_PASSWORD: corkboard_secret
          POSTGRES_DB: corkboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with Ruff
        run: |
          cd backend
          ruff check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql://corkboard:corkboard_secret@localhost:5432/corkboard_test
          SECRET_KEY: ci-test-secret-key-not-for-production
        run: |
          cd backend
          pytest tests/ -v
